[build]
  base      = "frontend"
  command   = "npm run build"
  publish   = "dist"

# Proxy semua request /api/* ke backend Railway
# Ganti RAILWAY_URL dengan URL Railway kamu setelah deploy
[[redirects]]
  from = "/api/*"
  to   = "https://aca-backend-production.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback — semua route diarahkan ke index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
